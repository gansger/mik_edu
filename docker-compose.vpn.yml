# Подключение: исходящий трафик бэкенда к Groq (api.groq.com, генерация вопросов) через OpenVPN.
# На хосте нужны права: /dev/net/tun, NET_ADMIN.
#
# 1. Положите конфиг клиента OpenVPN в ./vpn/client.ovpn (см. vpn/README.md).
# 2. Запуск:
#    docker compose -f docker-compose.yml -f docker-compose.vpn.yml up -d --build
#
# Бэкенд в сетевом namespace контейнера gluetun: запросы к api.groq.com идут через VPN.
# Порт API на хосте — 8000 (проброшен с gluetun). Фронт проксирует на gluetun:8000.

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: mik-edu-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/gluetun/client.ovpn
      # Если логин/пароль не в .ovpn, задайте (или используйте auth-user-pass в файле):
      # - OPENVPN_USER=
      # - OPENVPN_PASSWORD=
    volumes:
      - ./vpn:/gluetun
    ports:
      - "8000:8000/tcp"
    restart: unless-stopped

  backend:
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_started
    ports: []

  frontend:
    # Явно: веб на хосте :80 (при merge override не потерять проброс порта)
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.vpn.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gluetun:
        condition: service_started
      backend:
        condition: service_healthy
