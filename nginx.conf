# -----------------------------------------------------------------------------
# Не путать с frontend/nginx.conf
#
# Образ frontend (Dockerfile) копирует в контейнер только frontend/nginx.conf:
# там статика из dist и location /api → backend — без proxy_pass на «frontend».
#
# Этот файл — пример ОТДЕЛЬНОГО reverse proxy в той же Docker-сети, что и
# docker-compose (сервисы backend + frontend). Если вставить конфиг с
# proxy_pass http://frontend:80 ВНУТРЬ контейнера frontend, запрос идёт на
# самого себя (hairpin по VIP Docker): часто таймаут / 502 Bad Gateway.
#
# Подключение: только как отдельный сервис nginx или свой хостовый nginx;
# не подменяйте им файл default.conf внутри образа frontend.
# -----------------------------------------------------------------------------

server {
    listen 80;
    server_name localhost;

    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
