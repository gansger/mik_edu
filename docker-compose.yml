services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mik-edu-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - UPLOAD_DIR=/app/uploads
      # Генерация вопросов теста (Groq): задайте QWEN_API_KEY в .env на сервере
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_MODEL=${QWEN_MODEL:-qwen/qwen3-32b}
      - QWEN_API_URL=${QWEN_API_URL:-https://api.groq.com/openai/v1/chat/completions}
      # Опционально: прокси для Groq (если не используете docker-compose.vpn.yml)
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mik-edu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
  backend_uploads:
