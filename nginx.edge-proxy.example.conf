# -----------------------------------------------------------------------------
# Пример ОТДЕЛЬНОГО reverse proxy (ещё один nginx / хостовый nginx перед compose).
# Боевой конфиг контейнера фронта — только frontend/nginx.conf (см. frontend/Dockerfile).
#
# Не монтировать этот файл в контейнер frontend как default.conf: location /
# с proxy_pass на frontend:80 создаёт обращение контейнера к самому себе → 502.
#
# Положите server/upstream в http { } вашего nginx или подключите как include.
#
# Upstream с именами backend/frontend резолвится при старте nginx; если этот nginx
# в том же compose и стартует раньше DNS — см. паттерн resolver + переменная в
# frontend/nginx.conf.
# -----------------------------------------------------------------------------

upstream mik_edu_backend {
  server backend:8000;
  keepalive 8;
}

upstream mik_edu_frontend {
  server frontend:80;
  keepalive 8;
}

server {
  listen 80;
  server_name localhost;

  location /api {
    proxy_pass http://mik_edu_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://mik_edu_frontend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
