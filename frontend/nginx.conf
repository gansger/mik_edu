server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html index.htm;

  # Встроенный DNS Docker (сеть compose). Переменная в proxy_pass заставляет
  # периодически пересоздавать соединение к backend после рестартов контейнера.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  location /api {
    set $backend_upstream backend;
    proxy_pass http://$backend_upstream:8000$request_uri;
    proxy_http_version 1.1;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html =404;
  }
}