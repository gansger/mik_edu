# См. frontend/Dockerfile → /etc/nginx/conf.d/default.conf
#
# upstream { server backend:8000 } резолвит имя при старте nginx; если DNS Docker
# (127.0.0.11) ещё не готов — конфиг не поднимается, контейнер в Restarting.
# Переменная в proxy_pass откладывает резолв до запроса (нужен resolver).

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html index.htm;

  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  location /api {
    set $mik_backend_host backend;
    proxy_pass http://$mik_backend_host:8000;
    proxy_http_version 1.1;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html =404;
  }
}
